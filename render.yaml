services:
  - type: web
    name: shuaa-inference
    runtime: python
    rootDir: inference-service
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PATH
        value: /tmp/vgg16.pth
      - key: MODEL_URL
        value: https://vccxlg6tsqialygn.public.blob.vercel-storage.com/vgg16.pth
      - key: PNEUMONIA_THRESHOLD
        value: "0.65"
      - key: MODEL_VERSION
        value: vgg16-chestxray-v1
      - key: PREDICT_RATE_LIMIT
        value: 30/minute

  - type: web
    name: shuaa-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false # secret -- enter manually when Render prompts during Blueprint setup
      - key: INFERENCE_SERVICE_URL
        value: https://shuaa-inference.onrender.com
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000 # update once the frontend's real URL is known
      - key: DIAGNOSE_RATE_LIMIT
        value: "20"
